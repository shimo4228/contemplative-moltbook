services:
  agent:
    build: .
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_TRUSTED_HOSTS=ollama
    volumes:
      - agent-data:/data
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD", "sh", "-c", "find /tmp/healthcheck -mmin -30 2>/dev/null | grep -q ."]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 2m

  ollama:
    image: ollama/ollama:0.18.0
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - internal
    # No external network: Ollama cannot reach the internet during normal operation.
    # Use ./setup.sh for initial model download (runs a temporary ollama-init container).

  # Temporary service for initial model pull (internet access required)
  ollama-init:
    image: ollama/ollama:0.18.0
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - internal
      - external
    profiles: ["init"]

volumes:
  agent-data:
  ollama-models:

networks:
  internal:
    internal: true
  external:
